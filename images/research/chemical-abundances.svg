<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img"><title>Stellar spectrum</title><desc>A stellar spectrum with absorption lines labeled by chemical element.</desc>
<rect width="400" height="200" fill="#f0ece4"/>
<path d="M72,80 L102,80 L109,116 L116,80 L152,80 L159,102 L166,80 L200,80 L207,126 L214,80 L250,80 L257,98 L264,80 L300,80 L308,112 L316,80 L346,80" fill="none" stroke="#1a7a6d" stroke-width="1.5"/>
<line x1="112" y1="64" x2="112" y2="80" stroke="#b45309" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>
<line x1="159" y1="64" x2="159" y2="80" stroke="#b45309" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>
<line x1="207" y1="64" x2="207" y2="80" stroke="#b45309" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>
<line x1="308" y1="64" x2="308" y2="80" stroke="#b45309" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>
<text x="112" y="58" font-family="Georgia,serif" font-size="10" fill="#8a857c" text-anchor="middle">Mg</text>
<text x="159" y="58" font-family="Georgia,serif" font-size="10" fill="#8a857c" text-anchor="middle">Ca</text>
<text x="207" y="58" font-family="Georgia,serif" font-size="10" fill="#8a857c" text-anchor="middle">Fe</text>
<text x="308" y="58" font-family="Georgia,serif" font-size="10" fill="#8a857c" text-anchor="middle">Ti</text>
<text x="200" y="190" font-family="Georgia,serif" font-size="11" fill="#8a857c" text-anchor="middle">Element abundances from stellar spectra</text>
</svg>
