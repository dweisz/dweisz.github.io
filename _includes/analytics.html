{% if site.analytics.google_id and site.analytics.google_id != "" %}
<!-- Google Analytics 4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.analytics.google_id }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ site.analytics.google_id }}');
</script>
{% endif %}

{% if site.analytics.umami_website_id and site.analytics.umami_website_id != "" %}
<!-- Umami Analytics -->
<script defer src="{{ site.analytics.umami_src | default: 'https://cloud.umami.is/script.js' }}" data-website-id="{{ site.analytics.umami_website_id }}"></script>
{% endif %}
